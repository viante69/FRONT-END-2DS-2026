<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aual02 - menu hamburguer</title>


    <style>
        .navlinks a {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        /* estilo do botao hamburguer */
        .hamburguer{
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        @media screen and (max-width: 768){
            .hamburguer {
                display: block;
            }

            .navlinks{
                display: none;
            flex-direction: column;
            position: absolute;
            top: 60px; /*altira da navbar*/
            left: 0;
            width: 100%;
            background-color: #333;
            text-align: center;
            padding: 20px;
            }

            .navlinks.active{
                display: flex;
            }
            
        }



        .navbar {
           background-color: black;
           display: flex;
           justify-content: space-between;
           align-items: center;
           padding: 15px;
        }
        .logo {

            color: white;
            font-size: 20px;
            font-weight: bold;
            /* estilo de links */

            .nav links{
                display: flex;/* exibe horizontalemnte o menu */
                flex-direction: column;
                position: absolute;
                top: 60px; 
                left: 0;
                width: 100%;
                background-color: #333;
                text-align: 0;
                padding: 0;
            } 
        
        }

    </style>
    

</head>
<body>

        </li>
        <a href="https://www.youtube.com/shorts/9pnpI-7YmV4">contato</a>

         </ul>
    </nav>

</html>
